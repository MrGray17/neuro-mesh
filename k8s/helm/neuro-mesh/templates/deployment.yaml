apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Release.Namespace }}
  labels:
    name: {{ .Release.Namespace }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "neuro-mesh.fullname" . }}-sa
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "neuro-mesh.fullname" . }}-role
  namespace: {{ .Release.Namespace }}
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "endpoints"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["networking.k8s.io"]
  resources: ["networkpolicies"]
  verbs: ["get", "list", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "neuro-mesh.fullname" . }}-rolebinding
  namespace: {{ .Release.Namespace }}
subjects:
- kind: ServiceAccount
  name: {{ include "neuro-mesh.fullname" . }}-sa
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "neuro-mesh.fullname" . }}-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "neuro-mesh.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
data:
  config.yaml: |
    node:
      discovery:
        port: {{ .Values.node.discovery.port }}
        protocol: {{ .Values.node.discovery.protocol }}
      consensus:
        port: {{ .Values.node.consensus.port }}
        protocol: {{ .Values.node.consensus.protocol }}
      ws:
        port: {{ .Values.node.ws.port }}
      metrics:
        port: {{ .Values.service.metricsPort }}
        enabled: {{ .Values.monitoring.prometheus.enabled }}
    pbft:
      consensus:
        timeout_seconds: {{ .Values.pbft.consensus.timeout_seconds }}
        round_ttl_seconds: {{ .Values.pbft.consensus.round_ttl_seconds }}
      rate_limiting:
        messages_per_second: {{ .Values.pbft.rate_limiting.messages_per_second }}
        cooldown_seconds: {{ .Values.pbft.rate_limiting.cooldown_seconds }}
    security:
      key_management:
        provider: {{ .Values.security.keyManagement.provider }}
        rotation_interval_hours: {{ .Values.security.keyManagement.rotationIntervalHours }}
      tls:
        minimum_version: {{ .Values.security.tls.minimumVersion }}
      audit:
        enabled: {{ .Values.security.audit.enabled }}
        retention_days: {{ .Values.security.audit.retentionDays }}
    monitoring:
      prometheus:
        enabled: {{ .Values.monitoring.prometheus.enabled }}
        port: {{ .Values.monitoring.prometheus.port }}
      tracing:
        enabled: {{ .Values.monitoring.tracing.enabled }}
        sampling_rate: {{ .Values.monitoring.tracing.samplingRate }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "neuro-mesh.fullname" . }}
  namespace: {{ .Release.Namespace }}
spec:
  serviceName: {{ include "neuro-mesh.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "neuro-mesh.name" . }}
      component: node
  template:
    metadata:
      labels:
        app: {{ include "neuro-mesh.name" . }}
        component: node
    spec:
      serviceAccountName: {{ include "neuro-mesh.fullname" . }}-sa
      securityContext:
        runAsNonRoot: {{ .Values.podSecurityContext.runAsNonRoot }}
        runAsUser: {{ .Values.podSecurityContext.runAsUser }}
        fsGroup: {{ .Values.podSecurityContext.fsGroup }}
        seccompProfile:
          type: {{ .Values.podSecurityContext.seccompProfile.type }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
      {{- range .Values.imagePullSecrets }}
        - name: {{ . }}
      {{- end }}
      {{- end }}
      containers:
      - name: neuro-mesh
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          capabilities:
            drop:
            {{- toYaml .Values.securityCapabilities.capabilities.drop | nindent 12 }}
            add:
            {{- toYaml .Values.securityCapabilities.capabilities.add | default (list "BPF" "NET_ADMIN" "PERFMON") | nindent 12 }}
          allowPrivilegeEscalation: {{ .Values.securityCapabilities.allowPrivilegeEscalation }}
          readOnlyRootFilesystem: {{ .Values.securityCapabilities.readOnlyRootFilesystem }}
        env:
        - name: NODE_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: NEURO_WS_PORT
          value: "{{ .Values.service.wsPort }}"
        - name: NEURO_UDP_DISCOVERY
          value: "{{ .Values.service.discoveryPort }}"
        - name: NEURO_UDP_CONSENSUS
          value: "{{ .Values.service.consensusPort }}"
        - name: NEURO_KEY_MANAGER
          value: "{{ .Values.security.keyManagement.provider }}"
        ports:
        - name: ws
          containerPort: {{ .Values.service.wsPort }}
          protocol: TCP
        - name: discovery
          containerPort: {{ .Values.service.discoveryPort }}
          protocol: UDP
        - name: consensus
          containerPort: {{ .Values.service.consensusPort }}
          protocol: UDP
        - name: metrics
          containerPort: {{ .Values.service.metricsPort }}
          protocol: TCP
        {{- if .Values.livenessProbe.enabled }}
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - nc -z localhost {{ .Values.service.wsPort }}
          initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
        {{- end }}
        {{- if .Values.readinessProbe.enabled }}
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - nc -z localhost {{ .Values.service.consensusPort }}
          initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
        {{- end }}
        resources:
          requests:
            cpu: {{ .Values.resources.requests.cpu }}
            memory: {{ .Values.resources.requests.memory }}
          limits:
            cpu: {{ .Values.resources.limits.cpu }}
            memory: {{ .Values.resources.limits.memory }}
        volumeMounts:
        - name: config
          mountPath: /config
        - name: tmp
          mountPath: /tmp
        - name: audit
          mountPath: /var/log/neuro-mesh
      volumes:
      - name: config
        configMap:
          name: {{ include "neuro-mesh.fullname" . }}-config
      - name: tmp
        emptyDir:
          medium: Memory
          sizeLimit: 100Mi
      - name: audit
        emptyDir:
          medium: Memory
          sizeLimit: 50Mi
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "neuro-mesh.fullname" . }}-headless
  namespace: {{ .Release.Namespace }}
spec:
  clusterIP: None
  selector:
    app: {{ include "neuro-mesh.name" . }}
    component: node
  ports:
  - name: ws
    port: {{ .Values.service.wsPort }}
    targetPort: {{ .Values.service.wsPort }}
  - name: discovery
    port: {{ .Values.service.discoveryPort }}
    targetPort: {{ .Values.service.discoveryPort }}
    protocol: UDP
  - name: consensus
    port: {{ .Values.service.consensusPort }}
    targetPort: {{ .Values.service.consensusPort }}
    protocol: UDP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "neuro-mesh.fullname" . }}
  namespace: {{ .Release.Namespace }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ include "neuro-mesh.name" . }}
    component: node
  ports:
  - name: ws
    port: {{ .Values.service.wsPort }}
    targetPort: {{ .Values.service.wsPort }}
  - name: metrics
    port: {{ .Values.service.metricsPort }}
    targetPort: {{ .Values.service.metricsPort }}
{{- if .Values.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "neuro-mesh.fullname" . }}
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: {{ include "neuro-mesh.name" . }}
      component: node
  policyTypes:
  - Ingress
  - Egress
  ingress:
  {{- range .Values.networkPolicy.ingress }}
  - from:
    {{- range .from }}
    {{- if .namespaceSelector }}
    - namespaceSelector:
        {{- toYaml .namespaceSelector | nindent 10 }}
    {{- end }}
    {{- if .podSelector }}
    - podSelector:
        {{- toYaml .podSelector | nindent 10 }}
    {{- end }}
    {{- end }}
    ports:
    {{- range .ports }}
    - protocol: {{ .protocol }}
      port: {{ .port }}
    {{- end }}
  {{- end }}
  egress:
  {{- range .Values.networkPolicy.egress }}
  - to:
    {{- range .to }}
    {{- if .namespaceSelector }}
    - namespaceSelector:
        {{- toYaml .namespaceSelector | nindent 10 }}
    {{- end }}
    {{- end }}
    ports:
    {{- range .ports }}
    - protocol: {{ .protocol }}
      port: {{ .port }}
    {{- end }}
  {{- end }}
{{- end }}