replicaCount: 5

image:
  repository: neuro-mesh/neuro-agent
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

rbac:
  create: true

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10000
  fsGroup: 10000
  seccompProfile:
    type: RuntimeDefault

securityCapabilities:
  capabilities:
    drop:
    - ALL
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  wsPort: 9000
  discoveryPort: 9998
  consensusPort: 9999
  metricsPort: 9090

resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi

node:
  discovery:
    port: 9998
    protocol: UDP
  consensus:
    port: 9999
    protocol: UDP
    timeout: 30
    roundTTL: 120
  ws:
    port: 9000

pbft:
  consensus:
    timeout_seconds: 30
    round_ttl_seconds: 120
  rate_limiting:
    messages_per_second: 100
    cooldown_seconds: 30

security:
  keyManagement:
    provider: "HSM"
    rotationIntervalHours: 24
  tls:
    minimumVersion: "1.3"
  audit:
    enabled: true
    retentionDays: 90

monitoring:
  prometheus:
    enabled: true
    port: 9090
  tracing:
    enabled: true
    samplingRate: 0.1

networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - port: 9090
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
        - port: 443

autoscaling:
  enabled: false
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

persistence:
  enabled: false
  storageClass: "standard"
  accessMode: ReadWriteOnce
  size: 10Gi

livenessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values:
            - neuro-mesh
        topologyKey: kubernetes.io/hostname