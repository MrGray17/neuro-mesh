apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: neuro-mesh-internal
  namespace: neuro-mesh
spec:
  podSelector:
    matchLabels:
      app: neuro-mesh
      component: node
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: neuro-mesh
          component: node
    ports:
    - protocol: TCP
      port: 9000
    - protocol: UDP
      port: 9998
    - protocol: UDP
      port: 9999
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 9090
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: neuro-mesh
          component: node
    ports:
    - protocol: TCP
      port: 9000
    - protocol: UDP
      port: 9998
    - protocol: UDP
      port: 9999
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: TCP
      port: 443
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: neuro-mesh-config
  namespace: neuro-mesh
data:
  config.yaml: |
    node:
      discovery:
        port: 9998
        protocol: UDP
      consensus:
        port: 9999
        protocol: UDP
      ws:
        port: 9000
        protocol: TCP
      metrics:
        port: 9090
        enabled: true
    pbf:
      consensus:
        timeout_seconds: 30
        round_ttl_seconds: 120
        quorum_calculation: "2f+1"
      rate_limiting:
        messages_per_second: 100
        cooldown_seconds: 30
    security:
      key_management:
        provider: "HSM"
        rotation_interval_hours: 24
      tls:
        minimum_version: "1.3"
        cipher_suites:
          - "ECDHE+AESGCM"
          - "ECDHE+CHACHA20"
      audit:
        enabled: true
        retention_days: 90
    monitoring:
      prometheus:
        enabled: true
        port: 9090
      tracing:
        enabled: true
        sampling_rate: 0.1
---
apiVersion: v1
kind: Secret
metadata:
  name: neuro-mesh-secrets
  namespace: neuro-mesh
type: Opaque
stringData:
  ca-cert.pem: |
    -----BEGIN CERTIFICATE-----
    # Your CA certificate here
    -----END CERTIFICATE-----
  node-cert.pem: |
    -----BEGIN CERTIFICATE-----
    # Your node certificate here
    -----END CERTIFICATE-----
  node-key.pem: |
    -----BEGIN PRIVATE KEY-----
    # Your node private key here
    -----END PRIVATE KEY-----