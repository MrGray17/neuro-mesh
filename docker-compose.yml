version: "3.8"

services:
  # Static dashboard served via nginx
  dashboard:
    image: nginx:alpine
    container_name: neuro_dashboard
    ports:
      - "8080:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
    restart: unless-stopped

  # WebSocket bridge — proxies from Docker bridge to host-network control_server.
  # Host-networked containers bind inside Docker's namespace; this proxy
  # forwards from the Docker bridge so the port is visible to WSL2/Windows.
  wsbridge:
    image: alpine/socat:latest
    container_name: neuro_wsbridge
    ports:
      - "9001:9001"
    command: ["TCP-LISTEN:9001,fork,reuseaddr", "TCP:172.18.0.1:9002"]
    restart: unless-stopped
    depends_on:
      - control

  # Control plane — aggregates UDP telemetry from all C++ nodes (port 9998, host net)
  # and serves per-node WebSocket heartbeat events to wsbridge (port 9002, host net).
  control:
    build:
      context: ./orchestration
      dockerfile: Dockerfile
    container_name: neuro_control
    network_mode: host
    restart: unless-stopped
    depends_on:
      - alpha

  alpha:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neuro_alpha
    privileged: true
    network_mode: host
    command: ["ALPHA"]
    volumes:
      - /sys/kernel/debug:/sys/kernel/debug:ro
      - /lib/modules:/lib/modules:ro
      - ./journal_ALPHA.log:/app/journal_ALPHA.log
    restart: unless-stopped

  bravo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neuro_bravo
    privileged: true
    network_mode: host
    command: ["BRAVO"]
    volumes:
      - /sys/kernel/debug:/sys/kernel/debug:ro
      - /lib/modules:/lib/modules:ro
      - ./journal_BRAVO.log:/app/journal_BRAVO.log
    restart: unless-stopped
    depends_on:
      - alpha

  charlie:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neuro_charlie
    privileged: true
    network_mode: host
    command: ["CHARLIE"]
    volumes:
      - /sys/kernel/debug:/sys/kernel/debug:ro
      - /lib/modules:/lib/modules:ro
      - ./journal_CHARLIE.log:/app/journal_CHARLIE.log
    restart: unless-stopped
    depends_on:
      - alpha
      - bravo
