services:
  dashboard:
    image: nginx:alpine
    container_name: neuro_dashboard
    ports:
      - "8080:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3

  wsbridge:
    build:
      context: ./orchestration
      dockerfile: Dockerfile
    container_name: neuro_wsbridge
    ports:
      - "9001:9001"
    command: ["python3", "-u", "ws_proxy.py"]
    restart: unless-stopped
    environment:
      NEURO_HOST_IP: "${NEURO_HOST_IP:-172.18.0.1}"

  alpha:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neuro_alpha
    cap_add:
      - SYS_ADMIN
      - BPF
      - NET_ADMIN
      - PERFMON
    network_mode: host
    command: ["ALPHA"]
    volumes:
      - /sys/kernel/debug:/sys/kernel/debug:ro
      - /lib/modules:/lib/modules:ro
    restart: unless-stopped

  bravo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neuro_bravo
    cap_add:
      - SYS_ADMIN
      - BPF
      - NET_ADMIN
      - PERFMON
    network_mode: host
    command: ["BRAVO"]
    volumes:
      - /sys/kernel/debug:/sys/kernel/debug:ro
      - /lib/modules:/lib/modules:ro
    restart: unless-stopped

  charlie:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neuro_charlie
    cap_add:
      - SYS_ADMIN
      - BPF
      - NET_ADMIN
      - PERFMON
    network_mode: host
    command: ["CHARLIE"]
    volumes:
      - /sys/kernel/debug:/sys/kernel/debug:ro
      - /lib/modules:/lib/modules:ro
    restart: unless-stopped

  delta:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neuro_delta
    cap_add:
      - SYS_ADMIN
      - BPF
      - NET_ADMIN
      - PERFMON
    network_mode: host
    command: ["DELTA"]
    volumes:
      - /sys/kernel/debug:/sys/kernel/debug:ro
      - /lib/modules:/lib/modules:ro
    restart: unless-stopped

  echo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neuro_echo
    cap_add:
      - SYS_ADMIN
      - BPF
      - NET_ADMIN
      - PERFMON
    network_mode: host
    command: ["ECHO"]
    volumes:
      - /sys/kernel/debug:/sys/kernel/debug:ro
      - /lib/modules:/lib/modules:ro
    restart: unless-stopped
